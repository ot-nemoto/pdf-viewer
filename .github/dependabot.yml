version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    target-branch: develop
    groups:
      production-dependencies:
        dependency-type: production
      development-dependencies:
        dependency-type: development

  - package-ecosystem: devcontainers
    directory: /
    schedule:
      interval: weekly
    target-branch: develop

  # github-actions エコシステムは追加しない。
  # ワークフローの actions バージョンは dev-commons（正典）が一元管理し、
  # sync-standards で配布される（リポジトリ側で自走 bump すると同期と競合するため）。
